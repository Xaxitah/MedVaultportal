<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--mv-font-sans); background: var(--mv-bg); color: var(--mv-ink); padding: 24px; }
  .cols { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; align-items: start; }
  .opts { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
</style>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ProgressBar, OptionButton, Flashcard } = window.MedVaultDesignSystem_bafe94;
  function Demo() {
    return (
      <div className="cols">
        <div>
          <ProgressBar value={3} max={10} label="Questão 3 de 10" />
          <div className="opts">
            <OptionButton letter="A" answered status="dimmed">Inibe a fosfolipase A2</OptionButton>
            <OptionButton letter="B" answered status="correct">Inibe a enzima ciclo-oxigenase (COX)</OptionButton>
            <OptionButton letter="C" answered status="wrong">Bloqueia canais de sódio</OptionButton>
          </div>
        </div>
        <Flashcard
          front="Qual o mecanismo de ação dos AINEs?"
          back="Inibição da ciclo-oxigenase (COX-1 e COX-2), reduzindo prostaglandinas."
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
