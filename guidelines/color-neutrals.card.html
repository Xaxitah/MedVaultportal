<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & Status" subtitle="Surfaces, ink, semantic states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--mv-font-sans); background: var(--mv-surface); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px; }
  .sw { height: 84px; border-radius: var(--mv-radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; border: 1px solid var(--mv-border); }
  .sw .name { font-size: 10.5px; font-weight: var(--mv-weight-bold); }
  .sw .hex { font-size: 9.5px; opacity: 0.7; font-family: var(--mv-font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background: var(--mv-bg);"><span class="name">bg</span><span class="hex">#f0f2f5</span></div>
    <div class="sw" style="background: var(--mv-surface);"><span class="name">surface</span><span class="hex">#ffffff</span></div>
    <div class="sw" style="background: var(--mv-ink); color:#fff;"><span class="name">ink</span><span class="hex">#1a1a2e</span></div>
    <div class="sw" style="background: var(--mv-ink-muted); color:#fff;"><span class="name">muted</span><span class="hex">#555</span></div>
    <div class="sw" style="background: var(--mv-success-bg); color: var(--mv-success-ink);"><span class="name">success</span><span class="hex">#10b981</span></div>
    <div class="sw" style="background: var(--mv-danger-bg); color: var(--mv-danger-ink);"><span class="name">danger</span><span class="hex">#ef4444</span></div>
    <div class="sw" style="background: var(--mv-warning-bg); color: var(--mv-warning-ink);"><span class="name">warning</span><span class="hex">#fbbf24</span></div>
  </div>
</body>
</html>
