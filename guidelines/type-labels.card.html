<!-- @dsCard group="Type" viewport="700x150" name="Eyebrows & Labels" subtitle="Uppercase tracked labels & card titles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--mv-font-sans); background: var(--mv-surface); color: var(--mv-ink); padding: 24px 26px; display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-size: var(--mv-text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: var(--mv-tracking-wider); color: var(--mv-ink-faint); }
  .card-title { font-size: var(--mv-text-md); font-weight: 800; text-transform: uppercase; letter-spacing: var(--mv-tracking-wide); color: var(--mv-ink); }
  .audio-label { font-size: var(--mv-text-sm); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--mv-resumo); }
</style>
</head>
<body>
  <div class="section-label">Disciplinas · sidebar section</div>
  <div class="card-title">Urologia</div>
  <div class="audio-label">📄 Resumo · artifact label</div>
</body>
</html>
