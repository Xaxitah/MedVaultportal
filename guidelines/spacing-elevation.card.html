<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Resting → hover lift (navy-tinted)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--mv-font-sans); background: var(--mv-bg); padding: 26px; }
  .row { display: flex; gap: 28px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 150px; height: 70px; background: var(--mv-surface); border-radius: var(--mv-radius-xl); border: 1px solid var(--mv-border); }
  .r { box-shadow: var(--mv-shadow); }
  .h { box-shadow: var(--mv-shadow-hover); }
  .c { box-shadow: var(--mv-shadow-card-hover); }
  .lbl { font-size: 11px; font-family: var(--mv-font-mono); color: var(--mv-ink-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box r"></div><span class="lbl">shadow (rest)</span></div>
    <div class="item"><div class="box h"></div><span class="lbl">shadow-hover</span></div>
    <div class="item"><div class="box c"></div><span class="lbl">card-hover (navy)</span></div>
  </div>
</body>
</html>
