<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--mv-font-sans); background: var(--mv-surface); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; height: 96px; border-radius: var(--mv-radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; color: #fff; }
  .sw .name { font-size: 12px; font-weight: var(--mv-weight-bold); }
  .sw .hex { font-size: 11px; opacity: 0.75; font-family: var(--mv-font-mono); }
  .row { gap: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--mv-navy-900);"><span class="name">navy-900</span><span class="hex">#1a1a2e</span></div>
    <div class="sw" style="background: var(--mv-navy-800);"><span class="name">navy-800</span><span class="hex">#16213e</span></div>
    <div class="sw" style="background: var(--mv-navy-700);"><span class="name">navy-700</span><span class="hex">#0f3460</span></div>
    <div class="sw" style="background: var(--mv-indigo-500);"><span class="name">indigo-500</span><span class="hex">#3949ab</span></div>
    <div class="sw" style="background: var(--mv-indigo-400);"><span class="name">indigo-400</span><span class="hex">#5c6bc0</span></div>
  </div>
</body>
</html>
