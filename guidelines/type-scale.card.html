<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Segoe UI / system stack — 400 to 800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--mv-font-sans); background: var(--mv-surface); color: var(--mv-ink); padding: 22px 26px; }
  .specimen { display: flex; flex-direction: column; gap: 12px; }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--mv-border-soft); padding-bottom: 10px; }
  .meta { font-family: var(--mv-font-mono); font-size: 10.5px; color: var(--mv-ink-faint); width: 130px; flex-shrink: 0; }
  .sample { line-height: 1.1; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="line"><span class="meta">2xl · 800</span><span class="sample" style="font-size: var(--mv-text-2xl); font-weight: 800;">💊 Farmacologia</span></div>
    <div class="line"><span class="meta">xl · 700</span><span class="sample" style="font-size: var(--mv-text-xl); font-weight: 700;">Quiz Interativo</span></div>
    <div class="line"><span class="meta">md · 600</span><span class="sample" style="font-size: var(--mv-text-md); font-weight: 600;">Bases Farmacológicas da Terapêutica</span></div>
    <div class="line"><span class="meta">base · 400</span><span class="sample" style="font-size: var(--mv-text-base); font-weight: 400;">Mecanismos de ação, farmacodinâmica e farmacoterapia.</span></div>
  </div>
</body>
</html>
