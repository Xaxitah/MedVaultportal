<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="6 → 20px, plus circular badges" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--mv-font-sans); background: var(--mv-surface); padding: 20px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 72px; background: var(--mv-navy-700); }
  .lbl { font-size: 11px; font-family: var(--mv-font-mono); color: var(--mv-ink-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius: var(--mv-radius-sm);"></div><span class="lbl">sm 6</span></div>
    <div class="item"><div class="box" style="border-radius: var(--mv-radius-md);"></div><span class="lbl">md 8</span></div>
    <div class="item"><div class="box" style="border-radius: var(--mv-radius-lg);"></div><span class="lbl">lg 10</span></div>
    <div class="item"><div class="box" style="border-radius: var(--mv-radius-xl);"></div><span class="lbl">xl 12</span></div>
    <div class="item"><div class="box" style="border-radius: var(--mv-radius-pill);"></div><span class="lbl">pill 20</span></div>
    <div class="item"><div class="box" style="border-radius: var(--mv-radius-round); width:48px; height:48px;"></div><span class="lbl">round</span></div>
  </div>
</body>
</html>
